<!DOCTYPE html>
<!--
    AuSIS_Map.html
    Interactive map of AuSIS (Australian Seismometers In Schools) stations.
    Fetches station and availability data from IRIS FDSN services (network S1).
    FDSN Network DOI: 10.7914/SN/S1
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuSIS - Australian Seismometers In Schools</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; }
        #map { width: 100%; height: 100vh; }
        #status { position: absolute; bottom: 8px; left: 8px; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 4px; font-size: 12px; color: #555; z-index: 1000; }
        .leaflet-popup-content-wrapper { opacity: 0.92 !important; }
        .leaflet-popup-content { margin: 10px 14px !important; font-size: 13px; line-height: 1.6; }
        .popup-title { font-weight: 700; font-size: 14px; color: #1e3a5f; margin-bottom: 4px; }
        .popup-code { font-family: monospace; font-size: 12px; color: #2563eb; background: #eff6ff; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 6px; }
        .popup-row { color: #4b5563; font-size: 12px; }
        .popup-row strong { color: #374151; }
        .leaflet-control-search { background: #fff; border-radius: 6px; border: 2px solid rgba(0,0,0,0.2); box-shadow: 0 1px 5px rgba(0,0,0,0.4); padding: 6px 10px; }
        .leaflet-control-search input { border: none; outline: none; font-size: 13px; width: 200px; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 4px; }
        .search-results div { padding: 4px 6px; cursor: pointer; font-size: 12px; border-radius: 3px; }
        .search-results div:hover { background: #eff6ff; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="status">Loading stations...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────
        var stations = [],   // Array of station objects from FDSN response
            markers = [],    // Array of Leaflet markers on the map
            map     = null;  // Leaflet map instance

        // ── Marker icon ────────────────────────────────────────────────
        // Generates an SVG inverted-triangle icon at the given pixel size.
        // Black fill with coloured stroke: green=streaming, orange=offline, red=ended.
        function triangleIcon(size, strokeColor) {
            var h = size / 2;
            var stroke = strokeColor || '#fff';
            var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<polygon points="' + h + ',2 ' + (size - 2) + ',' + (size - 2) + ' 2,' + (size - 2) + '" fill="#000" stroke="' + stroke + '" stroke-width="2" stroke-linejoin="round"/></svg>';
            return L.divIcon({ html: svg, className: '', iconSize: [size, size], iconAnchor: [h, size - 2], popupAnchor: [0, -(size - 4)] });
        }

        // Returns the stroke colour for a station based on its status
        function stationStrokeColor(s) {
            if (s.endTime) return '#ef4444';        // red — ended
            if (s.latestData) {
                var daysAgo = Math.floor((Date.now() - s.latestData.getTime()) / 86400000);
                if (daysAgo <= 7) return '#22c55e';  // green — streaming
                return '#facc15';                     // yellow — offline
            }
            return '#22c55e';                         // green — active (no availability data)
        }

        // ── Map initialisation ──────────────────────────────────────────
        // Creates the Leaflet map centred on Australia with satellite tiles,
        // a search control (top-right), and a home/reset button (top-left).
        function initMap() {
            map = L.map('map', { center: [-26, 134], zoom: 5, maxZoom: 18, minZoom: 3 });
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; Esri', maxZoom: 18, opacity: 0.8 }).addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18, opacity: 0.6 }).addTo(map);

            // Search control
            var SearchControl = L.Control.extend({
                onAdd: function() {
                    var c = L.DomUtil.create('div', 'leaflet-control-search');
                    var input = L.DomUtil.create('input', '', c);
                    input.type = 'text'; input.placeholder = 'Search stations...';
                    var res = L.DomUtil.create('div', 'search-results', c);
                    L.DomEvent.disableClickPropagation(c);
                    L.DomEvent.disableScrollPropagation(c);
                    input.oninput = function() {
                        var q = input.value.trim().toLowerCase(); res.innerHTML = '';
                        if (q.length < 2) return;
                        stations.filter(function(s) { return s.code.toLowerCase().indexOf(q) !== -1 || s.name.toLowerCase().indexOf(q) !== -1; }).slice(0, 10).forEach(function(s) {
                            var row = document.createElement('div');
                            row.innerHTML = '<b style="color:#2563eb;font-family:monospace">' + s.code + '</b> ' + s.name;
                            row.onclick = function() { input.value = ''; res.innerHTML = ''; map.setView([s.lat, s.lng], 12, { animate: true }); setTimeout(function() { s.marker.openPopup(); }, 300); };
                            res.appendChild(row);
                        });
                    };
                    return c;
                }
            });
            new SearchControl({ position: 'topright' }).addTo(map);

            // Home button
            var HomeControl = L.Control.extend({
                onAdd: function() {
                    var div = L.DomUtil.create('div', 'leaflet-bar');
                    div.innerHTML = '<a href="#" title="Zoom to all stations" style="font-size:16px; line-height:30px; display:block; width:30px; text-align:center; text-decoration:none;">&#x1F3E0;</a>';
                    div.onclick = function(e) { e.preventDefault(); if (markers.length > 0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.05)); };
                    return div;
                }
            });
            new HomeControl({ position: 'topleft' }).addTo(map);

            // Resize markers when zoom changes (range 16–32 px)
            map.on('zoomend', function() {
                var size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
                stations.forEach(function(s) {
                    if (s.marker) s.marker.setIcon(triangleIcon(size, stationStrokeColor(s)));
                });
            });
        }

        // ── Helpers ─────────────────────────────────────────────────────
        // Converts an ISO date string (e.g. "2019-03-15T00:00:00") to
        // a readable format: "15 Mar 2019".
        function formatDate(d) {
            if (!d) return 'Unknown';
            var p = d.substring(0, 10).split('-');
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return p.length === 3 ? p[2] + ' ' + months[parseInt(p[1], 10) - 1] + ' ' + p[0] : d;
        }

        // ── Data fetching ──────────────────────────────────────────────
        // Queries the IRIS FDSN Station Service for all S1 network
        // stations. The response is pipe-delimited text:
        //   Network|Station|Latitude|Longitude|Elevation|SiteName|StartTime|EndTime
        // Returns an array of station objects.
        async function fetchStations() {
            var resp = await fetch('https://service.iris.edu/fdsnws/station/1/query?network=S1&level=station&format=text');
            if (!resp.ok) throw new Error('IRIS returned HTTP ' + resp.status);
            var lines = (await resp.text()).trim().split('\n');
            var out = [];
            for (var i = 1; i < lines.length; i++) {
                var p = lines[i].split('|');
                if (p.length < 7) continue;
                var code = p[1].trim();
                if (code === 'TEST') continue;  // Skip test station
                out.push({ code: code, lat: parseFloat(p[2]), lng: parseFloat(p[3]), elevation: parseFloat(p[4]), name: p[5].trim(), startTime: p[6].trim(), endTime: p[7] ? p[7].trim() : '', latestData: null, marker: null });
            }
            return out;
        }

        // ── Data availability ─────────────────────────────────────────
        // Queries the IRIS FDSN Availability extent endpoint for BH and HH
        // channels across all S1 stations to determine streaming status.
        // Some stations (e.g. AUDAR) only stream HH channels, not BH.
        // Columns: N S L C Q SampleRate Earliest Latest Updated TimeSpans Restriction
        async function fetchAvailability() {
            try {
                var resp = await fetch('https://service.iris.edu/fdsnws/availability/1/extent?network=S1&channel=BH?,HH?&format=text');
                if (!resp.ok) return;
                var lines = (await resp.text()).trim().split('\n');
                var latest = {};  // code → latest Date
                for (var i = 1; i < lines.length; i++) {
                    var cols = lines[i].trim().split(/\s+/);
                    if (cols.length < 8) continue;
                    var code = cols[1];
                    var dt = new Date(cols[7]);
                    if (!latest[code] || dt > latest[code]) latest[code] = dt;
                }
                stations.forEach(function(s) {
                    if (latest[s.code]) s.latestData = latest[s.code];
                });
            } catch (e) {
                // Availability is non-critical; popups will omit the row
            }
        }

        // ── Marker rendering ─────────────────────────────────────────
        // Places a triangle marker for each station. Popups show school
        // name, station code, recording period, status, and coordinates.
        // A station is "Active" if it has no endTime in the FDSN response.
        function addMarkers() {
            var size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
            stations.forEach(function(s) {
                var icon = triangleIcon(size, stationStrokeColor(s));
                var html = '<div class="popup-title">' + s.name + '</div>'
                    + '<span class="popup-code">S1.' + s.code + '</span>'
                    + '<div class="popup-row"><strong>Recording since:</strong> ' + formatDate(s.startTime) + '</div>'
                    + (function() {
                        if (s.endTime) return '<div class="popup-row"><strong>End:</strong> ' + formatDate(s.endTime) + '</div>';
                        if (!s.latestData) return '<div class="popup-row" style="color:#16a34a"><strong>Status:</strong> Active</div>';
                        var daysAgo = Math.floor((Date.now() - s.latestData.getTime()) / 86400000);
                        if (daysAgo <= 7) return '<div class="popup-row" style="color:#16a34a"><strong>Data:</strong> Streaming</div>';
                        return '<div class="popup-row" style="color:#d97706"><strong>Last data:</strong> ' + formatDate(s.latestData.toISOString()) + ' (' + daysAgo + ' days ago)</div>';
                    })()
                    + '<div class="popup-row"><strong>Latitude:</strong> ' + s.lat.toFixed(4) + '</div>'
                    + '<div class="popup-row"><strong>Longitude:</strong> ' + s.lng.toFixed(4) + '</div>'
                    + '<div class="popup-row"><strong>Elevation:</strong> ' + s.elevation.toFixed(0) + ' m</div>'
                    + (s.latestData && Math.floor((Date.now() - s.latestData.getTime()) / 86400000) <= 7
                        ? '<div class="popup-row" style="margin-top:6px"><a href="https://www.iris.edu/app/station_monitor/#Today/S1-' + s.code + '/webicorder/" target="_blank" style="color:#2563eb;text-decoration:none;font-size:12px">View Live Webicorder &#x2197;</a></div>'
                        : '');
                var m = L.marker([s.lat, s.lng], { icon: icon }).bindPopup(html, { maxWidth: 280 }).addTo(map);
                s.marker = m; markers.push(m);
            });
        }

        // ── Initialise ─────────────────────────────────────────────────
        initMap();
        fetchStations().then(function(data) {
            stations = data;
            // Fetch availability data before rendering so popups show streaming status
            return fetchAvailability();
        }).then(function() {
            addMarkers();
            if (markers.length > 0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.05));
            var active = stations.filter(function(s) { return !s.endTime; }).length;
            var streaming = stations.filter(function(s) { return s.latestData && Math.floor((Date.now() - s.latestData.getTime()) / 86400000) <= 7; }).length;
            document.getElementById('status').textContent = active + ' active stations | ' + streaming + ' live streaming';
        }).catch(function(err) {
            document.getElementById('status').innerHTML = '<span style="color:red">Error: ' + err.message + '</span>';
        });
    </script>
</body>
</html>
