<!DOCTYPE html>
<!--
    AuSIS_Map.html
    Interactive map of AuSIS (Australian Seismometers In Schools) stations.
    Fetches station and availability data from IRIS FDSN services (network S1).
    FDSN Network DOI: 10.7914/SN/S1
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuSIS Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, Helvetica, sans-serif; display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background: #282572; color: #fff; padding: 4px 16px; min-height: 36px;
        }
        .header-title { font-size: 18px; font-weight: 400; letter-spacing: 0.3px; }
        .header-logo img { height: 36px; }

        /* Map */
        #map { flex: 1; width: 100%; }

        /* Popups */
        .leaflet-popup-content-wrapper { opacity: 0.92 !important; }
        .leaflet-popup-content { margin: 10px 14px !important; font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 1.6; }
        .popup-title { font-weight: 700; font-size: 14px; color: #282572; margin-bottom: 4px; }
        .popup-code { font-family: monospace; font-size: 12px; color: #2563eb; background: #eff6ff; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 6px; }
        .popup-row { color: #4b5563; font-size: 12px; }
        .popup-row strong { color: #374151; }

        /* Controls — hidden by default for clean map view */
        .leaflet-control-zoom { display: none !important; }
        .toolbar-wrap, .toolbar-wrap .leaflet-bar { background: none !important; border: none !important; box-shadow: none !important; }
        .tools-toggle { display: block; width: 30px; height: 30px; line-height: 30px; text-align: center; background: rgba(255,255,255,0.3); border-radius: 4px; border: 2px solid rgba(0,0,0,0.2); cursor: pointer; font-size: 18px; color: #333; text-decoration: none; }
        .tools-toggle:hover { background: rgba(255,255,255,0.95); }
        .toolbar-buttons { display: none; margin-top: 4px; }
        .toolbar-buttons.open { display: block; }
        .btn-group { margin-top: 4px; }
        .btn-group:first-child { margin-top: 0; }
        .btn-group a { display: block; width: 30px; height: 30px; line-height: 30px; text-align: center; background: #fff; border: 2px solid rgba(0,0,0,0.2); cursor: pointer; text-decoration: none; }
        .btn-group a:first-child { border-radius: 4px 4px 0 0; }
        .btn-group a + a { border-top: none; }
        .btn-group a:last-child { border-radius: 0 0 4px 4px; }
        .btn-group a:only-child { border-radius: 4px; }
        .btn-group a:hover { background: #f0f0f0; }
        .search-panel { display: none; background: #fff; border-radius: 6px; border: 2px solid rgba(0,0,0,0.2); box-shadow: 0 1px 5px rgba(0,0,0,0.4); padding: 4px 10px; margin-top: 6px; }
        .search-panel.open { display: block; }
        .search-panel input { border: none; outline: none; font-family: Arial, Helvetica, sans-serif; font-size: 13px; width: 200px; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 4px; }
        .search-results div { padding: 4px 6px; cursor: pointer; font-size: 12px; border-radius: 3px; font-family: Arial, Helvetica, sans-serif; }
        .search-results div:hover { background: #eff6ff; }

        /* Footer / Legend */
        .footer {
            display: flex; align-items: center; justify-content: center; gap: 24px;
            background: #282572; color: #fff; padding: 6px 16px; min-height: 36px;
            font-family: Arial, Helvetica, sans-serif; font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-icon { display: inline-block; }

        @media (max-width: 600px) {
            .header-title { font-size: 14px; }
            .footer { flex-wrap: wrap; gap: 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-title"><span id="header-title">AuSIS Map</span></span>
        <span class="header-logo"><img src="assets/auscope-logo.png" alt="AuScope"></span>
    </div>

    <div id="map"></div>

    <div class="footer">
        <span class="legend-item"><span class="legend-icon" id="legend-streaming"></span> <span id="legend-streaming-text">Live streaming</span></span>
        <span class="legend-item"><span class="legend-icon" id="legend-offline"></span> Intermittent</span>
        <span class="legend-item"><span class="legend-icon" id="legend-ended"></span> Decommissioned</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ── Constants ─────────────────────────────────────────────────
        const LIVE_THRESHOLD_DAYS = 7;

        // ── State ─────────────────────────────────────────────────────
        let stations = [],
            map     = null;

        // ── Helpers ──────────────────────────────────────────────────
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ── Marker icon ──────────────────────────────────────────────
        function triangleSVG(size, strokeColor) {
            const h = size / 2;
            return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
                + '<polygon points="' + h + ',2 ' + (size - 2) + ',' + (size - 2) + ' 2,' + (size - 2) + '" fill="#000" stroke="' + strokeColor + '" stroke-width="2" stroke-linejoin="round"/></svg>';
        }
        function triangleIcon(size, strokeColor) {
            const h = size / 2;
            const stroke = strokeColor || '#fff';
            return L.divIcon({ html: triangleSVG(size, stroke), className: '', iconSize: [size, size], iconAnchor: [h, size - 2], popupAnchor: [0, -(size - 4)] });
        }

        function stationStrokeColor(s) {
            if (s.endTime) return '#ef4444';
            if (s.latestData) {
                const daysAgo = Math.floor((Date.now() - s.latestData.getTime()) / 86400000);
                if (daysAgo <= LIVE_THRESHOLD_DAYS) return '#22c55e';
                return '#facc15';
            }
            return '#22c55e';
        }

        // ── Legend icons ─────────────────────────────────────────────
        function setLegendIcons() {
            document.getElementById('legend-streaming').innerHTML = triangleSVG(16, '#22c55e');
            document.getElementById('legend-offline').innerHTML = triangleSVG(16, '#facc15');
            document.getElementById('legend-ended').innerHTML = triangleSVG(16, '#ef4444');
        }

        // ── Map initialisation ───────────────────────────────────────
        function initMap() {
            map = L.map('map', { center: [-26, 134], zoom: 5, maxZoom: 18, minZoom: 3, zoomControl: false });
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri', maxZoom: 18, opacity: 0.8 }).addTo(map);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18, opacity: 0.6 }).addTo(map);

            // Tools button — three dots toggle
            const ToolbarControl = L.Control.extend({
                onAdd: function() {
                    const wrap = L.DomUtil.create('div', 'toolbar-wrap');
                    L.DomEvent.disableClickPropagation(wrap);
                    L.DomEvent.disableScrollPropagation(wrap);

                    const toggle = L.DomUtil.create('a', 'tools-toggle', wrap);
                    toggle.href = '#'; toggle.title = 'Map tools';
                    toggle.innerHTML = '&#x22EE;';

                    const buttons = L.DomUtil.create('div', 'toolbar-buttons', wrap);

                    const zoomGroup = L.DomUtil.create('div', 'btn-group', buttons);
                    const zoomIn = L.DomUtil.create('a', '', zoomGroup);
                    zoomIn.href = '#'; zoomIn.title = 'Zoom in'; zoomIn.innerHTML = '+'; zoomIn.style.fontSize = '18px';
                    zoomIn.onclick = function(e) { e.preventDefault(); map.zoomIn(); };
                    const zoomOut = L.DomUtil.create('a', '', zoomGroup);
                    zoomOut.href = '#'; zoomOut.title = 'Zoom out'; zoomOut.innerHTML = '&minus;'; zoomOut.style.fontSize = '18px';
                    zoomOut.onclick = function(e) { e.preventDefault(); map.zoomOut(); };

                    const homeGroup = L.DomUtil.create('div', 'btn-group', buttons);
                    const home = L.DomUtil.create('a', '', homeGroup);
                    home.href = '#'; home.title = 'Zoom to all stations';
                    home.innerHTML = '&#x1F3E0;'; home.style.fontSize = '16px';
                    home.onclick = function(e) { e.preventDefault(); map.setView([-28, 134], 4); };

                    const searchGroup = L.DomUtil.create('div', 'btn-group', buttons);
                    const searchBtn = L.DomUtil.create('a', '', searchGroup);
                    searchBtn.href = '#'; searchBtn.title = 'Search stations';
                    searchBtn.innerHTML = '&#x1F50D;'; searchBtn.style.fontSize = '15px';

                    const panel = L.DomUtil.create('div', 'search-panel', wrap);
                    const input = L.DomUtil.create('input', '', panel);
                    input.type = 'text'; input.placeholder = 'Search stations...';
                    const res = L.DomUtil.create('div', 'search-results', panel);

                    toggle.onclick = function(e) {
                        e.preventDefault();
                        const isOpen = buttons.classList.contains('open');
                        buttons.classList.toggle('open');
                        if (isOpen) { panel.classList.remove('open'); }
                    };

                    searchBtn.onclick = function(e) {
                        e.preventDefault();
                        panel.classList.toggle('open');
                        if (panel.classList.contains('open')) { input.value = ''; res.innerHTML = ''; input.focus(); }
                    };

                    input.oninput = function() {
                        const q = input.value.trim().toLowerCase(); res.innerHTML = '';
                        if (q.length < 2) return;
                        stations.filter(function(s) { return s.code.toLowerCase().indexOf(q) !== -1 || s.name.toLowerCase().indexOf(q) !== -1; }).slice(0, 10).forEach(function(s) {
                            const row = document.createElement('div');
                            row.innerHTML = '<b style="color:#2563eb;font-family:monospace">' + esc(s.code) + '</b> ' + esc(s.name);
                            row.onclick = function() { input.value = ''; res.innerHTML = ''; panel.classList.remove('open'); map.setView([s.lat, s.lng], 12, { animate: true }); setTimeout(function() { s.marker.openPopup(); }, 300); };
                            res.appendChild(row);
                        });
                    };

                    return wrap;
                }
            });
            new ToolbarControl({ position: 'topleft' }).addTo(map);

            map.on('zoomend', function() {
                const size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
                stations.forEach(function(s) {
                    if (s.marker) s.marker.setIcon(triangleIcon(size, stationStrokeColor(s)));
                });
            });
        }

        // ── Formatting ───────────────────────────────────────────────
        function formatDate(d) {
            if (!d) return 'Unknown';
            const p = d.substring(0, 10).split('-');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return p.length === 3 ? p[2] + ' ' + months[parseInt(p[1], 10) - 1] + ' ' + p[0] : d;
        }

        // ── Data fetching (live IRIS with local GeoJSON fallback) ────
        async function fetchStations() {
            try {
                var resp = await fetch('https://service.iris.edu/fdsnws/station/1/query?network=S1&level=station&format=text');
                if (!resp.ok) throw new Error('IRIS returned HTTP ' + resp.status);
                var lines = (await resp.text()).trim().split('\n');
                var out = [];
                for (var i = 1; i < lines.length; i++) {
                    var p = lines[i].split('|');
                    if (p.length < 7) continue;
                    var code = p[1].trim();
                    if (code === 'TEST') continue;
                    var lat = parseFloat(p[2]), lng = parseFloat(p[3]);
                    if (isNaN(lat) || isNaN(lng)) continue;
                    var endRaw = p[7] ? p[7].trim() : '';
                    out.push({ code: code, lat: lat, lng: lng, elevation: parseFloat(p[4]), name: p[5].trim(), startTime: p[6].trim(), endTime: endRaw || null, latestData: null, marker: null });
                }
                return out;
            } catch (e) {
                console.warn('IRIS API failed, using local backup:', e);
                return fetchStationsFromBackup();
            }
        }

        async function fetchStationsFromBackup() {
            try {
                var resp = await fetch('data/ausis_stations.geojson');
                if (!resp.ok) return [];
                var geojson = await resp.json();
                return (geojson.features || []).map(function(f) {
                    var coords = f.geometry.coordinates;
                    var p = f.properties;
                    return { code: p.code, lat: coords[1], lng: coords[0], elevation: p.elevation || 0, name: p.name || p.code, startTime: p.startTime || '', endTime: p.endTime || null, latestData: null, marker: null };
                });
            } catch (e) {
                console.warn('Local backup also failed:', e);
                return [];
            }
        }

        async function fetchAvailability() {
            try {
                const resp = await fetch('https://service.iris.edu/fdsnws/availability/1/extent?network=S1&channel=BH?,HH?&format=text');
                if (!resp.ok) return;
                const lines = (await resp.text()).trim().split('\n');
                const latest = {};
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].trim().split(/\s+/);
                    if (cols.length < 8) continue;
                    const code = cols[1];
                    const dt = new Date(cols[7]);
                    if (!latest[code] || dt > latest[code]) latest[code] = dt;
                }
                stations.forEach(function(s) {
                    if (latest[s.code]) s.latestData = latest[s.code];
                });
            } catch (e) {
                console.warn('Failed to fetch availability data:', e);
            }
        }

        // ── Marker rendering ─────────────────────────────────────────
        function stationZIndex(s) {
            if (s.endTime) return 0;
            if (s.latestData) {
                const daysAgo = Math.floor((Date.now() - s.latestData.getTime()) / 86400000);
                if (daysAgo <= LIVE_THRESHOLD_DAYS) return 2000;
                return 1000;
            }
            return 2000;
        }

        function buildPopupHtml(s) {
            var daysAgo = s.latestData ? Math.floor((Date.now() - s.latestData.getTime()) / 86400000) : null;
            return '<div class="popup-title">' + esc(s.name) + '</div>'
                + '<span class="popup-code">S1.' + esc(s.code) + '</span>'
                + '<div class="popup-row"><strong>Recording since:</strong> ' + formatDate(s.startTime) + '</div>'
                + (function() {
                    if (s.endTime) return '<div class="popup-row"><strong>End:</strong> ' + formatDate(s.endTime) + '</div>';
                    if (!s.latestData) return '<div class="popup-row" style="color:#16a34a"><strong>Status:</strong> Active</div>';
                    if (daysAgo <= LIVE_THRESHOLD_DAYS) return '<div class="popup-row" style="color:#16a34a"><strong>Data:</strong> Streaming</div>';
                    return '<div class="popup-row" style="color:#d97706"><strong>Last data:</strong> ' + formatDate(s.latestData.toISOString()) + ' (' + daysAgo + ' days ago)</div>';
                })()
                + '<div class="popup-row"><strong>Latitude:</strong> ' + s.lat.toFixed(4) + '</div>'
                + '<div class="popup-row"><strong>Longitude:</strong> ' + s.lng.toFixed(4) + '</div>'
                + '<div class="popup-row"><strong>Elevation:</strong> ' + s.elevation.toFixed(0) + ' m</div>'
                + (daysAgo !== null && daysAgo <= LIVE_THRESHOLD_DAYS
                    ? '<div class="popup-row" style="margin-top:6px"><a href="https://www.iris.edu/app/station_monitor/#Today/S1-' + esc(s.code) + '/webicorder/" target="_blank" rel="noopener" style="color:#2563eb;text-decoration:none;font-size:12px">View Live Webicorder &#x2197;</a></div>'
                    : '');
        }

        function addMarkers() {
            var size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
            var sorted = stations.slice().sort(function(a, b) { return stationZIndex(a) - stationZIndex(b); });
            sorted.forEach(function(s) {
                var icon = triangleIcon(size, stationStrokeColor(s));
                var m = L.marker([s.lat, s.lng], { icon: icon, zIndexOffset: stationZIndex(s) }).bindPopup(buildPopupHtml(s), { maxWidth: 280 }).addTo(map);
                s.marker = m;
            });
        }

        // Update existing markers in place — no remove/add, no flash
        function refreshMarkers() {
            var size = Math.max(16, Math.min(32, map.getZoom() * 2.9));
            stations.forEach(function(s) {
                if (s.marker) {
                    s.marker.setIcon(triangleIcon(size, stationStrokeColor(s)));
                    s.marker.setZIndexOffset(stationZIndex(s));
                    s.marker.setPopupContent(buildPopupHtml(s));
                }
            });
        }

        function updateHeader() {
            var active = stations.filter(function(s) { return !s.endTime; }).length;
            var streaming = stations.filter(function(s) { return s.latestData && Math.floor((Date.now() - s.latestData.getTime()) / 86400000) <= LIVE_THRESHOLD_DAYS; }).length;
            document.getElementById('header-title').textContent = 'AuSIS Map - ' + active + ' active stations';
            document.getElementById('legend-streaming-text').textContent = 'Live streaming (' + streaming + ')';
        }

        // ── Initialise ───────────────────────────────────────────────
        setLegendIcons();
        initMap();

        // Step 1: Load local backup instantly for immediate display
        fetchStationsFromBackup().then(function(data) {
            if (data.length > 0) {
                stations = data;
                addMarkers();
                map.setView([-28, 134], 4);
                updateHeader();
            }

            // Step 2: Fetch live IRIS data in background, merge into existing stations
            return fetch('https://service.iris.edu/fdsnws/station/1/query?network=S1&level=station&format=text')
                .then(function(resp) {
                    if (!resp.ok) throw new Error('IRIS HTTP ' + resp.status);
                    return resp.text();
                })
                .then(function(text) {
                    var lines = text.trim().split('\n');
                    // Build lookup of live data by station code
                    var liveByCode = {};
                    for (var i = 1; i < lines.length; i++) {
                        var p = lines[i].split('|');
                        if (p.length < 7) continue;
                        var code = p[1].trim();
                        if (code === 'TEST') continue;
                        var endRaw = p[7] ? p[7].trim() : '';
                        liveByCode[code] = { startTime: p[6].trim(), endTime: endRaw || null };
                    }
                    // Merge live data into existing stations (preserving markers)
                    stations.forEach(function(s) {
                        if (liveByCode[s.code]) {
                            s.startTime = liveByCode[s.code].startTime;
                            s.endTime = liveByCode[s.code].endTime;
                        }
                    });
                    return fetchAvailability();
                })
                .then(function() {
                    refreshMarkers();
                    updateHeader();
                });
        }).catch(function(err) {
            console.warn('Live refresh failed, using backup data:', err);
            // Backup data already displayed - nothing else to do
        });
    </script>
</body>
</html>
